<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosto ROI Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: black; color: #cbd5e1; font-family: sans-serif; }
        .nosto-pink { color: #ec4899; }
        .bg-nosto-pink { background-color: #ec4899; }
        input[type="range"] { accent-color: #ec4899; }
        .card { background-color: #0f172a; border: 1px solid #1e293b; border-radius: 1rem; }
        .table-row:hover { background-color: rgba(30, 41, 59, 0.5); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-10 gap-6">
            <div class="flex items-center gap-4">
                <div class="bg-nosto-pink p-3 rounded-xl text-white shadow-lg shadow-pink-600/20">
                    <i data-lucide="zap" class="fill-white"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black text-white uppercase tracking-tighter">The Nosto Effect</h1>
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em]">ROI & Performance Projection</p>
                </div>
            </div>
            <div class="flex gap-4">
                <div class="bg-slate-900 border border-slate-800 p-4 rounded-xl min-w-[140px]">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Annual ROI</p>
                    <p id="roi-display" class="text-3xl font-black nosto-pink">0x</p>
                </div>
                <div class="bg-slate-900 border border-slate-800 p-4 rounded-xl min-w-[200px]">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Revenue Uplift</p>
                    <p id="uplift-rev-header" class="text-3xl font-black text-white">$0</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 mb-8">
            <!-- Left: Inputs -->
            <div class="lg:col-span-4 space-y-6">
                <!-- Parameters -->
                <div class="card p-6 space-y-5">
                    <h2 class="text-xs font-black uppercase tracking-widest text-slate-500 mb-2 flex items-center gap-2">
                        <i data-lucide="bar-chart-2" size="14" class="text-pink-500"></i> Baseline Metrics
                    </h2>
                    <div>
                        <label class="block text-[10px] font-bold uppercase mb-2 text-slate-400">Monthly Traffic</label>
                        <input type="number" id="traffic" value="316667" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white outline-none focus:border-pink-500 transition-all">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold uppercase mb-2 text-slate-400">CVR %</label>
                            <input type="number" id="cvr" step="0.01" value="2.17" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white outline-none focus:border-pink-500 transition-all">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold uppercase mb-2 text-slate-400">AOV $</label>
                            <input type="number" id="aov" value="101" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white outline-none focus:border-pink-500 transition-all">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold uppercase mb-2 text-slate-400 flex justify-between">
                            <span>Gross Margin</span>
                            <span id="margin-val" class="nosto-pink font-black">60%</span>
                        </label>
                        <input type="range" id="margin" min="1" max="100" value="60" class="w-full cursor-pointer">
                    </div>
                </div>

                <!-- Nosto Config -->
                <div class="bg-pink-600 p-6 rounded-2xl shadow-xl shadow-pink-600/10 text-white space-y-5">
                    <h2 class="text-xs font-black uppercase tracking-widest mb-2 flex items-center gap-2">
                        <i data-lucide="package" size="14"></i> Nosto Package
                    </h2>
                    <div>
                        <label class="block text-[10px] font-bold uppercase mb-2 opacity-80">Annual Investment (AUD)</label>
                        <div class="relative">
                            <span class="absolute left-3 top-2 text-pink-200 font-bold">$</span>
                            <input type="number" id="cost" value="25765" class="w-full bg-pink-700/50 border border-pink-400/30 rounded-lg pl-8 pr-3 py-2 text-white font-bold outline-none focus:ring-2 focus:ring-white/20">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold uppercase mb-2 opacity-80 flex justify-between">
                            <span>Target Uplift</span>
                            <span id="uplift-val" class="font-black">10%</span>
                        </label>
                        <input type="range" id="targetUplift" min="1" max="25" value="10" class="w-full cursor-pointer accent-white">
                    </div>
                </div>
            </div>

            <!-- Right: Chart & Table -->
            <div class="lg:col-span-8 space-y-6">
                <!-- Visual -->
                <div class="card p-8">
                    <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
                        <h2 class="text-sm font-black text-white uppercase tracking-tighter">Revenue Growth Roadmap</h2>
                        <div class="flex items-center gap-6 text-[10px] font-bold uppercase tracking-widest text-slate-500">
                            <div class="flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-slate-700"></div> Baseline</div>
                            <div class="flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-nosto-pink"></div> Nosto</div>
                        </div>
                    </div>
                    <div class="h-64">
                        <canvas id="growthChart"></canvas>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-8 pt-8 border-t border-slate-800">
                        <div class="flex flex-col">
                            <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Net Profit Increase</span>
                            <span id="net-profit" class="text-2xl font-black nosto-pink">$0</span>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Break-Even Point</span>
                            <span class="text-2xl font-black text-white">Month 1</span>
                        </div>
                    </div>
                </div>

                <!-- Detailed Table -->
                <div class="card overflow-hidden">
                    <div class="p-4 bg-slate-900/50 border-b border-slate-800">
                        <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Optimization Timeline</h3>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-xs">
                            <thead>
                                <tr class="text-slate-500 border-b border-slate-800 font-bold uppercase">
                                    <th class="px-6 py-4">Phase</th>
                                    <th class="px-6 py-4">Uplift</th>
                                    <th class="px-6 py-4">Monthly Value</th>
                                    <th class="px-6 py-4 text-right">Total Revenue</th>
                                </tr>
                            </thead>
                            <tbody id="table-body" class="text-slate-300">
                                <!-- Data rows injected by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const ctx = document.getElementById('growthChart').getContext('2d');
        let chart;

        const fmt = (val) => new Intl.NumberFormat('en-AU', { style: 'currency', currency: 'AUD', maximumFractionDigits: 0 }).format(val);

        function calculate() {
            const traffic = parseFloat(document.getElementById('traffic').value) || 0;
            const cvr = (parseFloat(document.getElementById('cvr').value) || 0) / 100;
            const aov = parseFloat(document.getElementById('aov').value) || 0;
            const margin = (parseFloat(document.getElementById('margin').value) || 0) / 100;
            const cost = parseFloat(document.getElementById('cost').value) || 0;
            const targetUplift = parseFloat(document.getElementById('targetUplift').value) || 0;
            
            document.getElementById('margin-val').innerText = (margin * 100) + '%';
            document.getElementById('uplift-val').innerText = targetUplift + '%';

            const baseMonthly = traffic * cvr * aov;
            const months = Array.from({length: 12}, (_, i) => i + 1);
            const dataBaseline = months.map(() => baseMonthly);
            const dataNosto = months.map(m => {
                const ramp = 2.5 + ((targetUplift - 2.5) * (m - 1) / 11);
                return baseMonthly * (1 + (ramp / 100));
            });

            const annualUplift = dataNosto.reduce((a, b) => a + b, 0) - (baseMonthly * 12);
            const roi = cost > 0 ? (annualUplift / cost).toFixed(2) : 0;
            const netProfit = (annualUplift * margin) - cost;
            
            document.getElementById('roi-display').innerText = roi + 'x';
            document.getElementById('uplift-rev-header').innerText = fmt(annualUplift);
            document.getElementById('net-profit').innerText = fmt(netProfit);

            updateChart(months, dataBaseline, dataNosto);
            updateTable(dataBaseline, dataNosto, targetUplift);
        }

        function updateChart(labels, baseline, nosto) {
            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels.map(m => 'Month ' + m),
                    datasets: [
                        {
                            label: 'Nosto',
                            data: nosto,
                            borderColor: '#ec4899',
                            backgroundColor: 'rgba(236, 72, 153, 0.1)',
                            fill: true,
                            tension: 0.4,
                            pointRadius: 2,
                            pointBackgroundColor: '#ec4899',
                            borderWidth: 3
                        },
                        {
                            label: 'Baseline',
                            data: baseline,
                            borderColor: '#334155',
                            borderDash: [5, 5],
                            fill: false,
                            tension: 0,
                            pointRadius: 0,
                            borderWidth: 1
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { 
                            grid: { color: '#1e293b' },
                            ticks: { color: '#475569', font: { size: 10 }, callback: v => '$' + (v/1000) + 'k' }
                        },
                        x: { grid: { display: false }, ticks: { color: '#475569', font: { size: 10 } } }
                    }
                }
            });
        }

        function updateTable(baseline, nosto, target) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            
            // Show Month 1, 3, 6, 12
            const steps = [0, 2, 5, 11];
            const labels = ["Deployment", "Learning", "Acceleration", "Optimized"];
            
            steps.forEach((idx, i) => {
                const ramp = 2.5 + ((target - 2.5) * (idx) / 11);
                const row = document.createElement('tr');
                row.className = 'table-row border-b border-slate-800/50 transition-colors';
                row.innerHTML = `
                    <td class="px-6 py-4">
                        <div class="font-black text-white uppercase text-[10px] tracking-tight">${labels[i]}</div>
                        <div class="text-[9px] text-slate-500 font-bold uppercase">Month ${idx + 1}</div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="text-pink-500 font-black">+${ramp.toFixed(1)}%</span>
                    </td>
                    <td class="px-6 py-4 text-slate-400">+${fmt(nosto[idx] - baseline[idx])}</td>
                    <td class="px-6 py-4 text-right font-black text-white">${fmt(nosto[idx])}</td>
                `;
                tbody.appendChild(row);
            });
        }

        ['traffic', 'cvr', 'aov', 'cost', 'targetUplift', 'margin'].forEach(id => {
            document.getElementById(id).addEventListener('input', calculate);
        });

        calculate();
    </script>
</body>
</html>
